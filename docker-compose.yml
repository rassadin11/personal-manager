services:
  app:
    build: .
    container_name: personal-manager
    restart: unless-stopped
    environment:
      PM_DATA_DIR: /data
      OPENCLAW_CONFIG_PATH: /config/openclaw.json
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ./data:/data
      - ./openclaw.json:/config/openclaw.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
