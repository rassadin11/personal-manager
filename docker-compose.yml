services:
  app:
    build: .
    container_name: personal-manager
    restart: unless-stopped
    environment:
      HOME: /home/artem
      PM_DATA_DIR: /data
      OPENCLAW_CONFIG_PATH: /tmp/openclaw.json
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ./data:/data
      - ./openclaw.json:/config/openclaw.json:ro
      - openclaw-state:/home/artem/.openclaw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header=\"Authorization: Bearer ${OPENCLAW_GATEWAY_TOKEN}\" http://127.0.0.1:18789/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  openclaw-state: